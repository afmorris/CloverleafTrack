name: Build and Publish CloverleafTrack

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  tag-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          tag_prefix: v
          create_annotated_tag: true

      - name: Skip build if no new tag
        if: steps.tag_version.outputs.new_tag == ''
        run: echo "No new tag generated; skipping build."

      - name: Set up Docker Buildx
        if: steps.tag_version.outputs.new_tag != ''
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.tag_version.outputs.new_tag != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.tag_version.outputs.new_tag != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./CloverleafTrack.Web/Dockerfile
          push: true
          tags: |
            ghcr.io/afmorris/cloverleaftrack:${{ steps.tag_version.outputs.new_tag }}
            ghcr.io/afmorris/cloverleaftrack:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
